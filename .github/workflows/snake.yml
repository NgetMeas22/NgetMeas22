name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *" 
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 50
    
    steps:
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: NgetMeas22
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=#db2777&color_dots=#161b22,#3e1c5c,#5c298a,#873ebd,#b65fe6
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#db2777&color_dots=#161b22,#3e1c5c,#5c298a,#873ebd,#b65fe6
          
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
